scenarios:
- name: Automation disabled prevents copy
  description: New orders exist but automation is off. Nothing should be forwarded.
  setup:
    accounts:
    - alias: Master
      account_number: VA111111
      api_key: master-key
      is_master: true
    - alias: Follower1
      account_number: VA222222
      api_key: follower-key
      is_master: false
    settings:
      use_automation: false
      multipliers:
        VA222222: 1
    history: []
    trades: []
  trigger:
    master_orders:
    - id: 10005
      class: equity
      symbol: TSLA
      side: buy
      quantity: 10
      type: market
      duration: day
      status: filled
      create_date: now
  expect:
    orders_forwarded: 0
    reason: Automation disabled
